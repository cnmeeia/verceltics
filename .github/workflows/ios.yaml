name: iOS Unsigned Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List project files
        run: |
          /usr/bin/find . -maxdepth 3 -name '*.xcodeproj' -print
          /usr/bin/find . -maxdepth 3 -name '*.xcworkspace' -print

      - name: List simulators
        run: xcrun simctl list devices available

      - name: Build for simulator
        run: |
          cd ios
          xcodebuild \
            -project "verceltics.xcodeproj" \
            -scheme "verceltics" \
            -destination 'platform=iOS Simulator,name=iPhone SE (3rd generation)' \
            -configuration Debug \
            build

      - name: Find built app
        id: find_app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*Build/Products/Debug-iphonesimulator/*.app" | head -n 1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Zip app
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.find_app.outputs.app_path }}" verceltics-simulator.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verceltics-simulator-build
          path: verceltics-simulator.app.zip
          if-no-files-found: error
          retention-days: 7
